name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lychee
        run: |
          curl -sSL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz -o lychee.tar.gz
          tar -xzf lychee.tar.gz
          sudo mv lychee /usr/local/bin/lychee

      - name: Check for broken links
        run: |
          lychee --no-progress \
            --exclude-path .claude/NOTES_ARCHIVE.md \
            --exclude "/CONTRIBUTING.md" \
            --exclude "docs/assets/logo.svg" \
            --exclude "docs/assets/maybe.svg" \
            --exclude "docs/assets/no.svg" \
            --exclude "docs/assets/screencast.svg" \
            --exclude "docs/assets/yes.svg" \
            --exclude "docs/docs/TROUBLESHOOTING.md" \
            --exclude "docs/examples" \
            "**/*.md"

  duplicates:
    name: Duplicate Code Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jscpd
        run: npm install -g jscpd

      - name: Run jscpd
        run: jscpd --min-lines 10 --min-tokens 50 --reporters console --ignore "**/*.json,**/NOTES_ARCHIVE.md" .
