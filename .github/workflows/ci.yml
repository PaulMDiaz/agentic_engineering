name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shell-tests:
    name: Shell Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run shell script tests
        run: bash tests/run

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install lychee
        env:
          LYCHEE_VERSION: lychee-v0.24.2
          LYCHEE_TARBALL: lychee-x86_64-unknown-linux-gnu.tar.gz
          LYCHEE_SHA256: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_VERSION}/${LYCHEE_TARBALL}"
          printf '%s  %s\n' "$LYCHEE_SHA256" "$LYCHEE_TARBALL" | sha256sum -c -
          tar -xzf "$LYCHEE_TARBALL"
          sudo install -m 755 lychee-x86_64-unknown-linux-gnu/lychee /usr/local/bin/lychee

      - name: Check for broken links
        run: |
          git ls-files '*.md' \
            | grep -v '^\.claude/NOTES_ARCHIVE\.md$' \
            | xargs lychee --no-progress --root-dir .

  duplicates:
    name: Duplicate Code Detection
    runs-on: ubuntu-latest
    env:
      CPD_VERSION: v5.0.11
      CPD_TARBALL: cpd-linux-x64-gnu.tar.gz
      CPD_SHA256: a2c42f87527478a6c0a93c12e452d0226565e7e209a7affa5f5d0c4364dc9e4a
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install cpd
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/kucherenko/jscpd/releases/download/${CPD_VERSION}/${CPD_TARBALL}"
          printf '%s  %s\n' "$CPD_SHA256" "$CPD_TARBALL" | sha256sum -c -
          tar -xzf "$CPD_TARBALL"
          sudo install -m 755 cpd /usr/local/bin/cpd

      - name: Run cpd
        run: |
          cpd --min-lines 10 --min-tokens 50 --reporters console --ignore "**/*.json,**/NOTES_ARCHIVE.md" .
